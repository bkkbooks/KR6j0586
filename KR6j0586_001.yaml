body:
  text: 吳月支國居士支謙譯如是我聞一時佛在阿耨達池龍王宮中與大比丘五百人俱及菩薩摩訶薩具足一千悉得一切陀羅尼餘一生在住十住地次當作佛如王太子俱於十方皆成佛道具大莊嚴不疑如來一切功德天龍八部一時俱會爾時師子威菩薩從座而起右膝著地合掌向佛而白佛言世尊若善男子善女人於如來所而修供養功德多不佛告師子威勿作是語若善男子善女人於如來所而修供養功德多不何以故如來無量戒定慧解脫解脫知見之所成就若善男子善女人於如來所若存若亡而修供養師子威當知是人終必於三乘中隨其因緣而得解脫復次師子威若復有人見佛世尊心生歡喜尊重讚歎以諸供養施於如來又復有人於如來滅後若見舍利心生歡喜是二功德等無有異復次師子威若在家菩薩以諸珍寶積如須彌供養聲聞及辟支佛不如出家菩薩發菩提心以一金錢供養如來復次師子威若復有人於千萬歲親近世尊備修供養若復有人如來滅後發菩提心以一香華入僧伽藍舉足下足作如是言南無世尊以此深解殷重信心供養如來舍利寶塔不以求報不以疑惑未得解脫中間若千萬億劫不墮惡道師子威諦聽有陀羅尼名曰華積我今當說為諸天人多所饒益若善男子能於華積陀羅尼呪受持讀誦親近依行功德勝彼是人世世得一聞持不墮諸惡險棘道中離諸艱難常見妙寶常見諸佛諸根常具不生下賤卑隸人家常得不離菩薩弘心常得種種無量慧辨為無量十方諸佛如來之所知見乃說呪曰但施峙耶反他一杜羅禰二拖羅禰三拖羅尼四拖羅尼五侔尼六波羅婆負荷反娑禰七悉諦八栴禘九那侔紙十嫟訶引囇狸迤反十一魯伽婆底十二佛陀婆底十三底囇狸迤反十四柯羅知胝迤反十五羅竪波伽知胝迤反十六知胝迤反杜婆底十七毗捨羅佛地十八達摩婆徙十九惡叉耶葛俾二十葛波毗伽知胝迤二十一阿媚多葛波休多大多禰二十二闍波底二十三哆嫟微耶反沙摩喜吳音反知胝迤反二十四蜀伽羅婆底二十五陟沙拏佛朕持引反地耶佛地瑣訶引二十六師子威當知若善男子能於此華積神呪若讀若誦是人當於三月四月九月從八日至十五日一心憶念如來相好夜中三誦華積神呪日中亦三至月圓時當以香華燈燭於形像前而修供養并誦華積陀羅尼呪其人是夜夢見如來相好具足坐蓮華座為衆說法亦得華積陀羅尼呪於現世中常得強記智慧深信從今身乃至涅槃常一聞持一切聞見一切經教一切學解一切技藝通達無礙於一切三昧深得清淨解四聖諦無上法輪說是經已師子威等天龍八部一切大衆歡喜奉行
